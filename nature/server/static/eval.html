const PIPELINE_OWNER_COLORS = {
  nature:   "#c49bff",
  wire:     "#9cdcfe",
  provider: "#7fe0b0",
  model:    "#ff9a9a",
};

function renderProviderPipeline(model) {
  const kind = detectProvider(model);
  const spec = PROVIDER_PIPELINES[kind] || PROVIDER_PIPELINES.ollama;
  const renderStage = (s, i, last) => {
    const color = PIPELINE_OWNER_COLORS[s.owner] || "var(--dim)";
    return `<div class="pipeline-stage">
      <span class="chip" style="color:${color}; border-color:${color}66">${esc(s.owner)}</span>
      <span class="muted">${esc(s.text)}</span>
    </div>${last ? "" : `<div class="pipeline-arrow muted">↓</div>`}`;
  };
  const reqHtml = spec.request.map((s, i, a) => renderStage(s, i, i === a.length - 1)).join("");
  const respHtml = spec.response.map((s, i, a) => renderStage(s, i, i === a.length - 1)).join("");
  const notesHtml = spec.notes.map(n => `<div class="muted">· ${esc(n)}</div>`).join("");

  return `<details class="full-section section-pipeline" open>
    <summary class="full-section-title">
      PROVIDER — <span style="color:#7fe0b0">${esc(spec.label)}</span>
      <span class="muted">· detected from model <code>${esc(model || "?")}</code></span>
    </summary>
    <div class="muted" style="margin:4px 0 8px 0; font-size:11px">${esc(spec.subtitle)}</div>
    <div class="pipeline-split">
      <div class="pipeline-column">
        <div class="pipeline-column-title muted">REQUEST — nature → model</div>
        ${reqHtml}
      </div>
      <div class="pipeline-column">
        <div class="pipeline-column-title muted">RESPONSE — model → nature</div>
        ${respHtml}
      </div>
    </div>
    <div class="pipeline-notes">${notesHtml}</div>
  </details>`;
}

function renderPayloadHeader(payload, data, compactions) {
  const cmpLine = compactions.length
    ? `<div class="muted">⚠ <strong>${compactions.length}</strong> body compaction${compactions.length>1?"s":""} happened before this turn — the messages list below is POST-compact. ${compactions.map(c => `<span class="muted">[${esc(c.strategy||"?")} ${c.before}→${c.after} tok @ event ${c.event_id}]</span>`).join(" ")}</div>`
    : "";
  return `<div class="full-section">
    <div class="payload-meta">
      <span class="chip">model</span> <code>${esc(payload.model || "?")}</code>
      <span class="chip">max_tokens</span> <code class="muted">${payload.max_tokens == null ? "(runtime config)" : payload.max_tokens}</code>
      <span class="chip">msgs</span> ${(data.message_count_reported ?? "?")}
      <span class="chip">tools</span> ${(data.tool_count_reported ?? "?")}
      <span class="muted" style="margin-left:auto">reported by llm.request</span>
    </div>
    ${cmpLine}
  </div>`;
}

function renderHeaderSection(systemBlocks, sys, principles) {
  // HEADER = the `system` parameter. Each block is either:
  //   - the role.instructions (index 0)
  //   - one of N principles sorted by priority
  const bodyHtml = systemBlocks.length ? systemBlocks.map((b, i) => {
    const text = b.type === "text" ? (b.text || "") : JSON.stringify(b);
    const cache = b.cache_control ? ` <span class="chip" style="color:#c49bff; border-color:#c49bff44">cache</span>` : "";
    // Try to label this block: first one is role.instructions; the
    // rest are principles (in priority order). Emit a tight chip so
    // the reader can see the provenance without opening a subpanel.
    let label;
    if (i === 0) {
      label = `<span class="chip" style="color:#ffd86a; border-color:#ffd86a44">role.instructions</span>
               <span class="muted">${esc(sys.role_name || "?")}</span>`;
    } else {
      const pr = principles[i - 1];
      label = pr
        ? `<span class="chip" style="color:#ffd86a; border-color:#ffd86a44">principle</span>
           <span class="muted">source=${esc(pr.source || "?")}</span>`
        : `<span class="chip">principle</span>`;
    }
    return `<div class="payload-item">
      <div class="payload-item-head">
        ${label}${cache}
        <span class="muted" style="margin-left:auto">${text.length} chars · system[${i}]</span>
      </div>
      <pre>${esc(text)}</pre>
    </div>`;
  }).join("") : `<div class="muted">· (no system)</div>`;
  return `<div class="full-section section-header">
    <div class="full-section-title" style="color:#ffb96a">
      HEADER — <span class="muted">payload.system · ${systemBlocks.length} block${systemBlocks.length===1?"":"s"}</span>
    </div>
    ${bodyHtml}
  </div>`;
}

function renderBodySection(bodyMsgs, eventMsgs, compactions) {
  // BODY = the `messages` parameter (minus the synthetic footer
  // tail). Provenance for each message is pulled from the
  // event-replay list by index — composer preserves order.
  //
  // After a body.compacted event, the event-replay list reset means
  // the first N messages have provenance.kind=compacted_synthetic.
  // Past that, it's the usual bootstrap / assistant / tool_result
  // pattern.
  if (!bodyMsgs.length) return `<div class="full-section section-body">
    <div class="full-section-title" style="color:#9cdcfe">BODY — <span class="muted">payload.messages (no body messages)</span></div>
  </div>`;

  const rowsHtml = bodyMsgs.map((m, i) => {
    const ev = eventMsgs[i] || {};
    const prov = ev.provenance || {};
    const provBadge = renderProvenanceBadge(prov);
    const blocks = m.content || [];
    const anyCache = blocks.some(b => b && b.cache_control);
    const cacheChip = anyCache ? ` <span class="chip" style="color:#c49bff; border-color:#c49bff44">cache anchor</span>` : "";
    const blocksHtml = blocks.map(b => renderFullBlock(b)).join("");
    return `<div class="payload-item">
      <div class="payload-item-head">
        <span class="chip">role=${esc(m.role)}</span>
        ${provBadge}${cacheChip}
        <span class="muted" style="margin-left:auto">messages[${m.index}] · ${blocks.length} block${blocks.length===1?"":"s"}${ev.event_id != null ? ` · event ${ev.event_id}` : ""}</span>
      </div>
      <div class="full-msg-body">${blocksHtml}</div>
    </div>`;
  }).join("");

  return `<div class="full-section section-body">
    <div class="full-section-title" style="color:#9cdcfe">
      BODY — <span class="muted">payload.messages · ${bodyMsgs.length} message${bodyMsgs.length===1?"":"s"} (conversation history)</span>
    </div>
    ${rowsHtml}
  </div>`;
}

function renderFooterSection(footerMsgs, hints) {
  // FOOTER = the tail user message the composer appends when any
  // footer rule fires. If no hints fired, nothing is appended —
  // still show the section so a reader can see "no footer" as a
  // first-class state instead of wondering if something is missing.
  if (!footerMsgs.length) {
    return `<div class="full-section section-footer">
      <div class="full-section-title" style="color:#c49bff">
        FOOTER — <span class="muted">appended as a tail user message when rules fire · 0 fired this turn</span>
      </div>
      <div class="muted">· (no footer this turn — no rules matched)</div>
    </div>`;
  }
  const hintsHtml = hints.length ? `<div class="muted" style="margin-top:4px">hints fired: ${
    hints.map(h => `<span class="chip hint">${esc(h.source)}</span>`).join(" ")
  }</div>` : "";
  const rowsHtml = footerMsgs.map(m => {
    const blocks = m.content || [];
    const anyCache = blocks.some(b => b && b.cache_control);
    const cacheChip = anyCache ? ` <span class="chip" style="color:#c49bff; border-color:#c49bff44">cache</span>` : "";
    const blocksHtml = blocks.map(b => renderFullBlock(b)).join("");
    return `<div class="payload-item">
      <div class="payload-item-head">
        <span class="chip">role=${esc(m.role)}</span>
        <span class="chip" style="color:#c49bff; border-color:#c49bff44">[FRAMEWORK NOTE]</span>
        ${cacheChip}
        <span class="muted" style="margin-left:auto">messages[${m.index}] · synthetic (composer-injected)</span>
      </div>
      <div class="full-msg-body">${blocksHtml}</div>
    </div>`;
  }).join("");
  return `<div class="full-section section-footer">
    <div class="full-section-title" style="color:#c49bff">
      FOOTER — <span class="muted">payload.messages tail · ${footerMsgs.length} synthetic message${footerMsgs.length===1?"":"s"} · ${hints.length} rule${hints.length===1?"":"s"} fired</span>
    </div>
    ${rowsHtml}
    ${hintsHtml}
  </div>`;
}

function renderToolsSection(tools) {
  if (!tools.length) return `<div class="full-section section-tools">
    <div class="full-section-title" style="color:#7fe0b0">TOOLS — <span class="muted">payload.tools (none registered)</span></div>
  </div>`;
  const rowsHtml = tools.map(t => {
    const cache = t.cache_control ? ` <span class="chip" style="color:#c49bff; border-color:#c49bff44">cache</span>` : "";
    const defer = t.defer_loading ? ` <span class="chip muted">defer</span>` : "";
    const head = (t.description || "").split("\n")[0].slice(0, 160);
    return `<details class="payload-item">
      <summary>
        <span class="chip">${esc(t.name)}</span>${defer}${cache}
        <span class="muted">${esc(head)}</span>
      </summary>
      <pre>${esc(JSON.stringify(t.input_schema || {}, null, 2))}</pre>
    </details>`;
  }).join("");
  return `<div class="full-section section-tools">
    <div class="full-section-title" style="color:#7fe0b0">
      TOOLS — <span class="muted">payload.tools · ${tools.length} tool${tools.length===1?"":"s"}</span>
    </div>
    ${rowsHtml}
  </div>`;
}

function renderRawJsonBlock(payload, notes) {
  const jsonPayload = { ...payload };
  delete jsonPayload._notes;
  const notesHtml = notes.length ? `<div class="api-payload-notes">${
    notes.map(n => `<div>⚠ ${esc(n)}</div>`).join("")
  }</div>` : "";
  return `<details class="full-section section-raw">
    <summary class="full-section-title">
      raw JSON — the body passed to <code>client.messages.stream(**kw)</code> · click to expand
      <button class="full-req-btn" style="margin-left:8px; padding:2px 6px; font-size:10px"
              onclick="event.preventDefault(); copyApiPayload(this)">copy JSON</button>
    </summary>
    ${notesHtml}
    <pre class="api-payload-raw">${esc(JSON.stringify(jsonPayload, null, 2))}</pre>
  </details>`;
}

async function copyApiPayload(btn) {
  const details = btn.closest("details");
  const pre = details?.querySelector(".api-payload-raw");
  if (!pre) return;
  try {
    await navigator.clipboard.writeText(pre.textContent);
    const orig = btn.textContent;
    btn.textContent = "copied";
    setTimeout(() => { btn.textContent = orig; }, 1200);
  } catch (e) {
    btn.textContent = "copy failed";
  }
}

const PROVENANCE_COLORS = {
  user_input:          "#9cdcfe",
  bootstrap:           "#ffb96a",
  assistant_text:      "#c49bff",
  assistant_tool_call: "#c49bff",
  tool_result:         "#7fe0b0",
  compacted_synthetic: "#ffd86a",
};
const PROVENANCE_LABELS = {
  user_input:          "user input",
  bootstrap:           "bootstrap (from parent)",
  assistant_text:      "assistant (text)",
  assistant_tool_call: "assistant (tool call)",
  tool_result:         "tool result",
  compacted_synthetic: "post-compact",
};
const PROVENANCE_TOOLTIPS = {
  user_input:          "Human-authored message entered via chat.",
  bootstrap:           "Seeded by a parent/sibling frame (e.g., receptionist→core handoff) before this agent's first LLM call.",
  assistant_text:      "Reply this agent's LLM generated after an llm.response.",
  assistant_tool_call: "Assistant message whose content includes a tool_use block — triggered the attached tool.started.",
  tool_result:         "Injected back into the conversation after a tool.completed. Each block's tool_use_id links back to the originating tool.started.",
  compacted_synthetic: "Written by body.compacted as a new message list (summary / anchor). Not a real chat turn.",
};

function renderProvenanceBadge(prov) {
  if (!prov || !prov.kind) return "";
  const c = PROVENANCE_COLORS[prov.kind] || "var(--dim)";
  const lbl = PROVENANCE_LABELS[prov.kind] || prov.kind;
  const tip = PROVENANCE_TOOLTIPS[prov.kind] || "";
  let tail = "";
  if (prov.kind === "tool_result" && prov.links?.length) {
    tail = prov.links.map(l =>
      l.source_event_id != null
        ? ` ← <span class="muted">${esc(l.tool_name || "?")} @ event ${l.source_event_id}</span>`
        : ` <span class="muted">(no matching tool.started)</span>`
    ).join("");
  } else if (prov.kind === "assistant_text" || prov.kind === "assistant_tool_call") {
    if (prov.llm_response_event_id != null) {
      tail = ` <span class="muted">← llm.response @ event ${prov.llm_response_event_id}</span>`;
    }
    if (prov.consumed_hint_event_id != null) {
      tail += ` <span class="muted">· hint @ event ${prov.consumed_hint_event_id}</span>`;
    }
  } else if (prov.kind === "user_input" && prov.user_input_event_id != null) {
    tail = ` <span class="muted">← user.input @ event ${prov.user_input_event_id}</span>`;
  } else if (prov.kind === "bootstrap" && prov.bootstrap_from) {
    tail = ` <span class="muted">from <strong>${esc(prov.bootstrap_from)}</strong></span>`;
  } else if (prov.kind === "compacted_synthetic") {
    tail = ` <span class="muted">(strategy=${esc(prov.strategy || "?")}, event ${prov.compaction_event_id})</span>`;
  }
  return `<span class="chip" style="color:${c}; border-color:${c}44" title="${esc(tip)}">${esc(lbl)}</span>${tail}`;
}

function renderFullBlock(b) {
  if (!b || typeof b !== "object") return "";
  const t = b.type;
  if (t === "text") {
    return `<div><span class="chip">text</span><pre>${esc(b.text || "")}</pre></div>`;
  }
  if (t === "tool_use") {
    const inp = b.input || {};
    return `<div><span class="chip">tool_use</span> <strong>${esc(b.name || "?")}</strong>
      <span class="muted">${esc((b.id || "").slice(0, 32))}</span>
      <pre>${esc(JSON.stringify(inp, null, 2))}</pre></div>`;
  }
  if (t === "tool_result") {
    let content = b.content;
    if (Array.isArray(content)) {
      content = content.map(c => c && c.type === "text" ? c.text : JSON.stringify(c)).join("");
    }
    const cls = b.is_error ? "err" : "";
    return `<div class="toolcall ${cls}"><div class="name">← ${b.is_error ? "ERR " : ""}tool_result ${esc((b.tool_use_id || "").slice(0, 32))}</div>
      <pre>${esc(String(content || ""))}</pre></div>`;
  }
  if (t === "image") {
    return `<div><span class="chip">image</span> <span class="muted">(omitted)</span></div>`;
  }
  return `<div><span class="chip">${esc(t || "?")}</span> <pre>${esc(JSON.stringify(b, null, 2).slice(0, 2000))}</pre></div>`;
}

function renderMissionPane(frame) {
  const m = frame.mission;
  if (!m) return "";
  // Always-visible "what this agent is trying to do". Collapsed by
  // default so long task briefings don't push IN/CALL/POST offscreen.
  const first = (m.text || "").split("\n").find(l => l.trim()) || "";
  return `<details class="mission-pane">
    <summary>
      <span class="chip" style="color:#ffd86a; border-color:#ffd86a44"
            title="Delegation text seeded by ${esc(m.from_ || "?")} into this frame before its first LLM call. The agent's mission — constant across all turns.">mission</span>
      <span class="muted">from ${esc(m.from_ || "?")} · event ${m.event_id}</span>
      <span class="mission-head">${esc(first.slice(0, 120))}${first.length > 120 ? "…" : ""}</span>
    </summary>
    <pre>${esc(m.text)}</pre>
  </details>`;
}

const IN_LABEL_TOOLTIP =
  "IN shows only the NEW input since the previous turn " +
  "(tool_result / user.input / hint). Click 'show full request' " +
  "to reconstruct the entire conversation history that went into " +
  "this LLM call.";

function renderInputLane(items, frameId, turnIdx) {
  const deltaBody = items.length
    ? items.map(it => {
        if (it.kind === "user_input") {
          return `<div><span class="chip">user</span> <pre>${esc(it.text || "")}</pre></div>`;
        }
        if (it.kind === "bootstrap") {
          return `<div><span class="chip" style="color:#ffd86a; border-color:#ffd86a44"
            title="Delegation context from ${esc(it.from_ || "?")} — this frame's first LLM call was seeded with this text.">bootstrap from ${esc(it.from_ || "?")}</span>
            <pre>${esc(it.text || "")}</pre></div>`;
        }
        if (it.kind === "tool_results") {
          return it.results.map(r => {
            const cls = r.is_error ? "err" : "";
            return `<div class="toolcall ${cls}">
              <div class="name">← ${r.is_error ? "ERR " : ""}tool_result</div>
              <pre>${esc(r.content || "")}</pre>
            </div>`;
          }).join("");
        }
        if (it.kind === "hint") {
          return it.hints.map(h => `<div><span class="chip hint">hint: ${esc(h.source)}</span>
            <span class="muted" title="${esc(h.text)}">${esc((h.text || "").split("\n")[0].slice(0, 120))}…</span>
          </div>`).join("");
        }
        return "";
      }).join("")
    : `<div class="muted">· (no new input — first turn or no events between calls)</div>`;

  const fullControl = `
    <div class="in-full-wrap">
      <button class="full-req-btn"
              onclick="loadFullRequest(this, '${esc(frameId)}', ${turnIdx})">
        show full request
      </button>
      <span class="muted" style="font-size:10.5px">
        reconstructed from events — system prompt + entire message history
      </span>
      <div class="full-req-body" style="display:none"></div>
    </div>`;

  return `<div class="lane lane-input"><span class="label" title="${esc(IN_LABEL_TOOLTIP)}">IN</span>
    <div class="body">
      <div class="in-delta">
        <div class="muted" style="font-size:10px; letter-spacing:0.04em; text-transform:uppercase">delta since last turn</div>
        ${deltaBody}
      </div>
      ${fullControl}
    </div>
  </div>`;
}

function renderPreLane(items) {
  if (!items.length) {
    return `<div class="lane lane-pre empty"><span class="label">PRE</span><span class="body">·</span></div>`;
  }
  const body = items.map(it => {
    if (it.kind === "body_compacted") {
      return `<div><span class="chip">body.compacted</span> <span class="muted">${esc(it.strategy || "")} ${it.before}→${it.after} tok</span></div>`;
    }
    return `<div><span class="chip">${esc(it.kind || "")}</span></div>`;
  }).join("");
  return `<div class="lane lane-pre"><span class="label">PRE</span><div class="body">${body}</div></div>`;
}

function renderCallLane(attempts) {
  if (!attempts.length) {
    return `<div class="lane lane-call empty"><span class="label">CALL</span><span class="body">·</span></div>`;
  }
  if (attempts.length === 1 && attempts[0].ok) {
    // Concise success — the header already shows all the numbers;
    // this lane becomes a single chip.
    return `<div class="lane lane-call"><span class="label">CALL</span>
      <div class="body"><div><span class="chip ok">ok</span> <span class="muted">request ${esc(attempts[0].request_id || "")}</span></div></div></div>`;
  }
  const rows = attempts.map((a, i) => {
    if (a.ok) {
      return `<div><span class="chip ok">attempt ${i + 1}: ok</span> <span class="muted">stop=${esc(a.stop_reason || "")}</span></div>`;
    }
    return `<div><span class="chip err">attempt ${i + 1}: ${esc(a.error_type || "")}</span> <span class="muted">${esc((a.message || "").slice(0, 160))}</span></div>`;
  }).join("");
  return `<div class="lane lane-call"><span class="label">CALL</span><div class="body">${rows}</div></div>`;
}

function renderPostLane(post, responseText, byId, _rendered) {
  const tool_uses = post.tool_uses || [];
  const parts = [];
  if (responseText) {
    parts.push(`<div><span class="chip">text</span> <pre>${esc(responseText)}</pre></div>`);
  }
  for (const tu of tool_uses) {
    const cls = tu.is_error ? "err" : "";
    const inputSummary = summarizeToolInput(tu.input || {});
    // For Agent spawns, add a chip that selects the child's first
    // turn in the graph (right pane re-renders for that turn).
    const spawnRef = tu.spawned_frame_id && byId[tu.spawned_frame_id]
      ? ` <span class="chip" style="cursor:pointer; color:var(--accent); border-color:rgba(106,168,255,0.4)"
               onclick="jumpToChildFirstTurn('${esc(tu.spawned_frame_id)}')">
           → open ${esc(byId[tu.spawned_frame_id].role)}
         </span>`
      : "";
    parts.push(`<div class="toolcall ${cls}">
      <div class="name">${tu.is_error ? "ERR " : "→ "}${esc(tu.name)}</div>
      <div>
        ${inputSummary}
        ${spawnRef}
        ${tu.output ? `<pre>${esc(tu.output)}</pre>` : ""}
      </div>
    </div>`);
  }
  if (!parts.length) {
    return `<div class="lane lane-post empty"><span class="label">POST</span><span class="body">·</span></div>`;
  }
  return `<div class="lane lane-post"><span class="label">POST</span><div class="body">${parts.join("")}</div></div>`;
}

function jumpToChildFirstTurn(fid) {
  const node = document.querySelector(
    `#cell-detail .frame-graph circle.node[data-frame="${fid}"][data-turn="0"]`
  );
  if (node) node.dispatchEvent(new MouseEvent("click", { bubbles: true }));
}

function summarizeToolInput(input) {
  if (!input || typeof input !== "object") return `<span class="muted">${esc(String(input))}</span>`;
  // Priority keys to show inline, rest as a <pre> block below so the
  // detail pane isn't lossy (TodoWrite.todos, Bash stdin, etc.).
  const keys = ["name", "file_path", "pattern", "command", "query"];
  const shown = [];
  for (const k of keys) {
    if (k in input) shown.push(`<span class="muted">${esc(k)}=${esc(String(input[k]).slice(0, 120))}</span>`);
  }
  const skip = new Set([...keys, "prompt", "old_string", "new_string", "content"]);
  const others = Object.keys(input).filter(k => !skip.has(k));
  let long = "";
  if (others.length) {
    const obj = {};
    for (const k of others) obj[k] = input[k];
    long += `<pre>${esc(JSON.stringify(obj, null, 2))}</pre>`;
  }
  // Special case: prompt (Agent) gets its own <pre>.
  // (Edit/Write old/new are already in the dedicated "Agent edits" section — skip here.)
  if (input.prompt) long += `<pre>${esc(String(input.prompt))}</pre>`;
  if (!shown.length && !long) {
    return `<span class="muted">${esc(JSON.stringify(input).slice(0, 150))}</span>`;
  }
  return shown.join(" ") + long;
}

function renderTlRow(ev) {
  const cls = ["tl-row"];
  let desc = "";
  if (ev.type === "frame.opened") {
    cls.push("frame-row");
    desc = `open <strong>${esc(ev.role)}</strong>` + (ev.model ? ` <span class="muted">(${esc(ev.model)})</span>` : "");
  } else if (ev.type === "frame.resolved") {
    cls.push("frame-row");
    desc = `resolve ${esc(ev.role)}`;
  } else if (ev.type === "frame.errored") {
    cls.push("frame-row", "error-row");
    desc = `<strong>ERR</strong> ${esc(ev.role)} — ${esc(ev.error_type)}: ${esc(ev.message)}`;
  } else if (ev.type === "llm.response") {
    desc = `response <span class="muted">stop=${esc(ev.stop_reason)}</span>`;
  } else if (ev.type === "llm.error") {
    cls.push("error-row");
    desc = `<strong>LLM ERR</strong> ${esc(ev.error_type)}: ${esc(ev.message)}`;
  } else if (ev.type === "tool.started") {
    const inp = ev.tool_input || {};
    const key = inp.file_path || inp.pattern || inp.command || inp.name || "";
    desc = `tool <strong>${esc(ev.tool_name)}</strong>` + (key ? ` <span class="muted">${esc(String(key).slice(0, 80))}</span>` : "");
  } else if (ev.type === "tool.completed") {
    if (ev.is_error) cls.push("error-row");
    desc = `← ${esc(ev.tool_name)} ${ev.is_error ? "<strong>err</strong>: " : ""}<span class="muted">${esc(ev.output || "")}</span>`;
  } else if (ev.type === "hint.injected") {
    cls.push("hint-row");
    const sources = (ev.hints || []).map(h => h.source).join(", ");
    desc = `hint [${esc(sources)}]`;
  } else if (ev.type === "body.compacted") {
    desc = `compact <span class="muted">${esc(ev.strategy)} ${ev.tokens_before}→${ev.tokens_after}</span>`;
  } else {
    desc = esc(ev.type);
  }
  return `<div class="${cls.join(" ")}">
    <span class="id">${ev.id ?? ""}</span>
    <span class="type">${esc(ev.type)}</span>
    <span class="muted">${esc(ev.role || "")}</span>
    <span>${desc}</span>
  </div>`;
}

async function loadDiff(aId) {
  const bId = $("diff-other").value;
  if (!bId) return;
  const r = await fetch(`/api/eval/diff?a=${encodeURIComponent(aId)}&b=${encodeURIComponent(bId)}`);
  if (!r.ok) {
    $("diff-out").innerHTML = `<div class="empty">diff failed (${r.status})</div>`;
    return;
  }
  const body = await r.json();
  $("diff-out").innerHTML = `<pre class="diff-block">${esc(body.markdown)}</pre>`;
}

loadRuns();
</script>
</body>
</html>
